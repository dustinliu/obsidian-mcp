# =============================================================================
# Build
# =============================================================================

[tasks.build]
command = "cargo"
args = ["build"]

[tasks.build-release]
command = "cargo"
args = ["build", "--release"]

[tasks.run]
command = "cargo"
args = ["run"]

# =============================================================================
# Quality
# =============================================================================

[tasks.fmt]
command = "cargo"
args = ["fmt"]

[tasks.fmt-check]
command = "cargo"
args = ["fmt", "--check"]

[tasks.clippy]
command = "cargo"
args = ["clippy", "--", "-D", "warnings"]

[tasks.lint]
dependencies = ["fmt-check", "clippy"]

# =============================================================================
# Test
# =============================================================================

[tasks.test]
command = "cargo"
args = ["test"]

[tasks.test-verbose]
command = "cargo"
args = ["test", "--", "--nocapture"]

[tasks.e2e]
command = "cargo"
args = ["test", "--test", "integration_test", "--", "--test-threads=1", "--nocapture"]

[tasks.coverage]
clear = true
command = "cargo"
args = ["llvm-cov", "--fail-under-lines", "85"]

[tasks.coverage-report]
clear = true
command = "cargo"
args = ["llvm-cov", "--html"]

[tasks.clean]
command = "cargo"
args = ["clean"]

# =============================================================================
# Composite
# =============================================================================

[tasks.check]
dependencies = ["lint", "test", "build"]
