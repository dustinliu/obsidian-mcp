name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    name: Build ${{ matrix.target }}
    needs: ci
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false
          - target: x86_64-apple-darwin
            runner: macos-latest
            cross: false
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          BINARY=target/${{ matrix.target }}/release/obsidian-mcp
          test -f "$BINARY" || { echo "::error::Binary not found: $BINARY"; exit 1; }
          tar czf obsidian-mcp-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release obsidian-mcp

      - uses: actions/upload-artifact@v4
        with:
          name: obsidian-mcp-${{ matrix.target }}
          path: obsidian-mcp-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Verify all artifacts present
        run: |
          for target in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            test -f "obsidian-mcp-${target}.tar.gz" || { echo "::error::Missing artifact for ${target}"; exit 1; }
          done

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: obsidian-mcp-*.tar.gz
